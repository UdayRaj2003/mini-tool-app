<!DOCTYPE html>
<html>

<head>
    <title>Mini Tool App</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Menu</h3>
        <ul>
            <li onclick="location.hash='/'">🛠 Tools</li>
            <li onclick="location.hash='/favorites'">⭐ Favorites</li>
        </ul>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- ROUTER CONTENT -->
        <div id="app">

            <!-- Default tools page -->
            <div id="tools" class="section">
                <h2>Available Tools</h2>
                <div id="toolContainer" class="card-container"></div>
            </div>

            <div id="favorites" class="section" style="display:none;">
                <h2>Favorite Tools</h2>
                <div id="favContainer" class="card-container"></div>
            </div>

        </div>

    </div>

</div>

<!-- Mobile Bottom Navigation -->

<div class="mobile-nav">
    <div onclick="location.hash='/'">🛠 Tools</div>
    <div onclick="location.hash='/favorites'">⭐ Favorites</div>
</div>

<script src="main.js"></script>

</body>
</html>
